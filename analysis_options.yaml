# Static analyzer + lint configuration for e_ticketing_helpdesk.
# Run via: `flutter analyze` and `dart run custom_lint`.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
  plugins:
    - custom_lint
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # `freezed` + `json_serializable` emit `@JsonKey` on factory
    # constructor parameters; analyzer 7.x flags this as
    # `invalid_annotation_target` even though the generator handles it
    # correctly. Suppress globally — the warning is noise.
    invalid_annotation_target: ignore

linter:
  rules:
    prefer_single_quotes: true
    require_trailing_commas: true
    avoid_print: true
