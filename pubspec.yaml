name: e_ticketing_helpdesk
description: "E-Ticketing Helpdesk mobile app — D4 Teknik Informatika, Universitas Airlangga (Aplikasi Mobile praktikum)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.0

  # Backend
  supabase_flutter: ^2.8.0

  # Network
  dio: ^5.7.0

  # Models & Code Gen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Functional Error Handling
  dartz: ^0.10.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Image / Camera
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Notifications
  flutter_local_notifications: ^17.2.4

  # UI
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.5.1
  logger: ^2.5.0

  # Env loading
  flutter_dotenv: ^5.2.1

dependency_overrides:
  # analyzer 7.x ships the Element2 migration; analyzer_plugin < 0.13
  # doesn't compile against it. Forced to latest 0.13.x to unblock
  # build_runner. Remove once upstream plugins catch up.
  analyzer_plugin: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - .env
